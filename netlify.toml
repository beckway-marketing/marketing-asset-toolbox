// Netlify Function: shared state storage via Netlify Blobs
// GET  /.netlify/functions/state  -> returns full hub state
// POST /.netlify/functions/state  -> overwrites full hub state (body = JSON)

import { getStore } from "@netlify/blobs";

const STORE_NAME = "beckway-marketing-hub";
const KEY = "state";

const EMPTY_STATE = {
  library: [],
  pipeline: [],
  recentlyViewed: [],
  lastUpdated: null,
  lastUpdatedBy: null
};

export default async (req, context) => {
  const store = getStore(STORE_NAME);

  if (req.method === "GET") {
    try {
      const existing = await store.get(KEY, { type: "json" });
      return new Response(JSON.stringify(existing || EMPTY_STATE), {
        headers: { "Content-Type": "application/json", "Cache-Control": "no-store" }
      });
    } catch (e) {
      return new Response(JSON.stringify({ error: e.message }), { status: 500 });
    }
  }

  if (req.method === "POST") {
    try {
      const body = await req.json();
      // Basic validation
      if (typeof body !== "object" || body === null) {
        return new Response(JSON.stringify({ error: "Invalid body" }), { status: 400 });
      }
      // Make sure required arrays exist
      const toSave = {
        library: Array.isArray(body.library) ? body.library : [],
        pipeline: Array.isArray(body.pipeline) ? body.pipeline : [],
        recentlyViewed: Array.isArray(body.recentlyViewed) ? body.recentlyViewed : [],
        lastUpdated: body.lastUpdated || new Date().toISOString(),
        lastUpdatedBy: body.lastUpdatedBy || "Unknown"
      };
      await store.setJSON(KEY, toSave);
      return new Response(JSON.stringify({ ok: true, lastUpdated: toSave.lastUpdated }), {
        headers: { "Content-Type": "application/json" }
      });
    } catch (e) {
      return new Response(JSON.stringify({ error: e.message }), { status: 500 });
    }
  }

  return new Response("Method not allowed", { status: 405 });
};

export const config = {
  path: "/.netlify/functions/state"
};
